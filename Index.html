    function _persistLinks() {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.saveLinksData(state.links);
        _lastChangeTime = Date.now();  // mark dirty so beforeunload knows
      }
    }

    // Flush the current link form if it has unsaved data
    function _flushLinkForms() {
      // Flush new-link form if both fields filled
      var newLabel = document.getElementById('new-link-label');
      var newUrl   = document.getElementById('new-link-url');
      if (newLabel && newUrl) {
        var label = newLabel.value.trim();
        var url   = newUrl.value.trim();
        if (label && url) {
          if (!url.match(/^https?:\/\//)) url = 'https://' + url;
          if (!state.links) state.links = [];
          // Only add if not already there (avoid duplicates on double-flush)
          var alreadyExists = state.links.some(function(l) { return l.label === label && l.url === url; });
          if (!alreadyExists) {
            state.links.push({ label: label, url: url });
            _persistLinks();
          }
        }
      }
      // Flush edit-link form if open
      var editLabel = document.getElementById('edit-link-label');
      var editUrl   = document.getElementById('edit-link-url');
      var editIdx   = document.getElementById('edit-link-idx');
      if (editLabel && editUrl && editIdx) {
        var elabel = editLabel.value.trim();
        var eurl   = editUrl.value.trim();
        var eidx   = parseInt(editIdx.value, 10);
        if (elabel && eurl && !isNaN(eidx) && state.links && state.links[eidx]) {
          if (!eurl.match(/^https?:\/\//)) eurl = 'https://' + eurl;
          state.links[eidx] = { label: elabel, url: eurl };
          _persistLinks();
        }
      }
    }

    // -- Drag-and-drop for links table -----------------------------------------

    function linksDragStart(idx) {
      linksDragIdx = idx;
    }

    function linksDrop(targetIdx) {
      if (linksDragIdx === null || linksDragIdx === targetIdx) return;
      const moved = state.links.splice(linksDragIdx, 1)[0];
      state.links.splice(targetIdx, 0, moved);
      linksDragIdx = null;
      _persistLinks();
      _renderLinksPage();
    }

    function linksDragEnd() {
      linksDragIdx = null;
    }

    // -- Task Link Functions ---------------------------------------------------

    function openLinkEditor(eventId, taskId) {
      linkEditingTask = eventId + '__' + taskId;
      renderApp();
      setTimeout(function() {
        let el = document.getElementById('link-input-' + eventId + '-' + taskId);
        if (el) { el.focus(); el.select(); }
      }, 30);
    }

    function closeLinkEditor() {
      linkEditingTask = null;
      renderApp();
    }

    function saveLinkFromInput(eventId, taskId) {
      let el = document.getElementById('link-input-' + eventId + '-' + taskId);
      let url = (el ? el.value : '').trim();
      if (url && !url.match(/^https?:\/\//)) url = 'https://' + url;
      saveTaskLink(eventId, taskId, url);
    }

    function saveTaskLink(eventId, taskId, url) {
      if (!state.tasks[eventId] || !state.tasks[eventId][taskId]) return;
      state.tasks[eventId][taskId].link = url || '';
      linkEditingTask = null;
      renderApp();
      if (typeof google !== 'undefined')
        google.script.run.updateTaskFieldAsync(eventId, taskId, 'link', url || '');
    }

    function removeTaskLink(eventId, taskId) {
      saveTaskLink(eventId, taskId, '');
    }

    function handleLinkInputKeydown(e, eventId, taskId) {
      if (e.key === 'Enter') { e.preventDefault(); saveLinkFromInput(eventId, taskId); }
      if (e.key === 'Escape') { e.preventDefault(); closeLinkEditor(); }
    }

    window.collapseAllAccordions = function() {
      if (!state || !state.expandedEvents) state.expandedEvents = {};
      Object.keys(state.expandedEvents).forEach(eventId => { state.expandedEvents[eventId] = false; });
      renderApp();
      if (typeof google !== 'undefined' && google.script?.run) {
        google.script.run
          .withFailureHandler(function(err) { console.warn("Background error syncing collapsed state:", err.message); })
          .saveLocalData("ui_expanded_events", state.expandedEvents);
      }
    };
  </script>
</body>
</html>
